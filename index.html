<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EduVault</title>
    <link rel="stylesheet" href="styles/style.css" />
    <link rel="stylesheet" href="styles/index.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="body body--home">
    <header>
      <h1 class="header header--center inter-heading">
        <img
          src="assets/images/book_mb.png"
          alt="book"
          width="60px"
          height="53px"
        />EduVault
      </h1>
    </header>
    <main class="main">
      <section class="hero-image">
        <img
          src="assets/images/white-hero2.png"
          alt="hero-section"
          width="460px"
          height="auto"
        />
        <h2 class="inter-heading inter-heading--small">Welcome to EduVault</h2>
      </section>
      <section class="hero-text inter-body">
        <p>
          All your study <span class="emphasis-text">materials</span> in one
          place
        </p>
        <p>
          Access lectures slide, past questions and assignments tailored to your
          course
        </p>

        <div class="components-gap">
          <a href="department.html" class="button block-a poppins-semibold"
            >Get Started</a
          >
          <a href="index.html">
            <div class="image-text">
              <span>Login</span>
              <img
                src="assets/icons/down-arrow.svg"
                alt="down-arrow"
                width="20px"
                height="20px"
              />
            </div>
          </a>
        </div>
      </section>
    </main>
  </body>
</html>
