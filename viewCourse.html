<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>View Course</title>
    <link rel="stylesheet" href="styles/style.css" />
    <link rel="stylesheet" href="styles/viewCourse.css" />
    <style>
      /* body {
      margin: 0;
      font-family: Arial;
      background: #f5f5f5;
     } */

      .toolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px;
        background: #222;
        color: white;
        flex-wrap: wrap;
      }

      .toolbar button {
        margin: 5px;
        padding: 8px 12px;
        border: none;
        background: #4caf50;
        color: white;
        cursor: pointer;
        border-radius: 4px;
      }

      .toolbar span {
        margin: 5px;
      }

      #viewer-container {
        display: flex;
        justify-content: center;
        padding: 10px;
      }

      canvas {
        max-width: 100%;
        height: auto;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
      }
    </style>
  </head>
  <body>
    <header class="header">
      <figure>
        <img
          src="assets/images/book_mb.png"
          alt="book"
          width="60px"
          height="53px"
        />
      </figure>
      <h1>EduVault</h1>
      <button class="toggle-nav" id="toggle-nav">toggle nav</button>
    </header>
    <nav class="menu-container" id="nav">
      <ul class="menu">
        <li class="menu__list"><a href="index.html">Home</a></li>
        <li class="menu__list"><a href="department.html">Department</a></li>
        <li class="menu__list"><a href="level.html">Level</a></li>
        <li class="menu__list"><a href="courses.html">Courses</a></li>
      </ul>
    </nav>
    <main class="main-iframe">
      <!-- <iframe src="" frameborder="0" width="100%" class="iframe"> </iframe> -->

      <div class="toolbar">
        <div>
          <button onclick="prevPage()">⬅ Prev</button>
          <button onclick="nextPage()">Next ➡</button>
        </div>

        <span
          >Page: <span id="page-num"></span> / <span id="page-count"></span
        ></span>

        <div>
          <button onclick="zoomOut()">➖ Zoom</button>
          <button onclick="zoomIn()">➕ Zoom</button>
        </div>
      </div>

      <div id="viewer-container" class="iframe">
        <canvas id="pdf-canvas"></canvas>
      </div>
    </main>
    <script src="scripts/nav.js"></script>
    <script>
      /* let iframeSrc = document.querySelector("iframe");
      iframeSrc.src = localStorage.getItem("lectureLink"); */
      console.log(localStorage.getItem("lectureLink"));
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
      pdfjsLib.GlobalWorkerOptions.workerSrc =
        "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
    </script>
    <script src="scripts/viewCourse.js"></script>
  </body>
</html>
